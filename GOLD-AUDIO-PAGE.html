<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khanqah Dar-ul-Falah - Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #b08d43; --dark: #4e3b2b; --bg: #fdfaf3; --red: #ff0000; --green: #0a5d38; }
        
        /* باڈی کی پیڈنگ بڑھا دی گئی ہے تاکہ ہیڈر جگہ نہ گھیرے */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding-top: 145px; overflow-x: hidden; }

        /* Navbar - اونچائی اور ڈیزائن درست کیا گیا */
        .navbar { background: var(--dark); color: white; position: fixed; top: 0; width: 100%; height: auto; display: flex; align-items: center; z-index: 1001; border-bottom: 4px solid var(--gold); padding: 12px 0; }
        .navbar-text { font-size: 13px; text-align: center; width: 100%; font-weight: bold; line-height: 1.4; padding: 0 10px; }

        /* ہیڈر کنٹرولز کا فاصلہ */
        .header-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .whatsapp-channel-btn {
            background-color: #25D366;
            color: white !important;
            padding: 2px 8px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 2px;
            transition: 0.3s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .app-download-btn { background: linear-gradient(45deg, #3d2e21, #b08d43); border: 2px solid var(--gold); }
        .header-social { display: flex; gap: 15px; align-items: center; }
        .header-social a { color: white; text-decoration: none; font-size: 13px; transition: 0.5s ease; }
        .header-social a:hover { color: yellow; transform: translateY(-2px); }

        /* سرچ بار کی پوزیشن - اسے نیوبار کے نیچے فکس کیا گیا ہے */
        .search-container { background: var(--dark); padding: 12px 0; border-bottom: 2px solid var(--gold); position: sticky; top: 130px; z-index: 1000; margin-top: -10px; }
        .search-box { display: flex; max-width: 330px; margin: 0 auto; background: white; border-radius: 5px; overflow: hidden; border: 1px solid var(--gold); }
        .search-box input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; text-align: right; direction: rtl; }
        .search-btn { background: var(--gold); color: white; border: none; padding: 0 18px; cursor: pointer; }

        /* مینو سلائیڈر - اب یہ واضح نظر آئے گا */
        .slider-wrapper { background: #fff; border-bottom: 2px solid var(--gold); overflow-x: auto; scrollbar-width: none; white-space: nowrap; padding: 15px 0; margin-top: 5px; position: relative; z-index: 998; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .menu-slider { display: inline-flex; gap: 12px; padding-left: 15px; animation: autoScroll 40s linear infinite; }
        @keyframes autoScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .grid-item { display: inline-block; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px; width: 100px; text-align: center; color: var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .grid-item i { font-size: 22px; margin-bottom: 6px; display: block; }
        .grid-item span { font-size: 10px; font-weight: bold; display: block; white-space: normal; line-height: 1.2; }

        .container { max-width:380px; margin: 0 auto; padding: 5px; }
        .logo-area { width: 100%; margin: 15px auto; background: #3d2e21; border: 2px solid var(--gold); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .logo-area img { width: 100%; display: block; }

        /* بیانات کارڈ کا اسٹائل */
        .bayan-card { background: #fff; border: 2.5px solid var(--gold); border-radius: 12px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bayan-header { background: var(--gold); color: white; padding: 14px; font-weight: bold; text-align: center; font-size: 17px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .audio-item { padding: 10px; border-bottom: 2px solid #eee; background: #fffcf5; }
        .title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; direction: rtl; }
        .bayan-num { background: var(--gold); color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; font-weight: bold; }
        .audio-title { font-size: 14px; font-weight: bold; color: #2c3e50; flex: 1; text-align: right; }

        /* آڈیو پلیئر اور اسپنر */
        .player-row { background: #111; padding: 5px; border-radius: 8px; margin: 5px 0; position: relative; border: 1px solid var(--gold); }
        audio { width: 100%; height: 32px; filter: invert(100%) hue-rotate(180deg); }
        
        /* اسپینر (Loading Animation) */
        .q-spinner { 
            position: absolute; left: 9.5%; top: 47.1%; transform: translate(-50%, -50%); 
            width: 18px; height: 18px; 
            border: 3px solid rgba(176,141,67,0.3); border-top-color: #25D366; 
            border-radius: 50%; animation: spin 0.8s linear infinite; 
            display: none; z-index: 10; 
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .dl-hint-urdu { background: var(--dark); color: var(--gold); font-size: 11px; text-align: center; padding: 8px; font-weight: bold; border-radius: 4px; margin-top: 5px; display: none; direction: rtl; }
        .meta-info { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-top: 6px; direction: ltr; }
        .loc-text { color: var(--gold); font-weight: bold; direction: rtl; }
        .pagination-row { display: flex; gap: 10px; padding: 12px; background: #f1f1f1; }
        .btn-page { background: var(--dark); color: white; border: 1px solid var(--gold); padding: 10px; border-radius: 6px; font-size: 12px; cursor: pointer; flex: 1; font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-text">
        SHEIKH-UL-HADEES HAZRAT MAULANA PEER MUHAMMAD JAMSHAID NAQSHBANDI (D.B)<br>
        <span style="font-size: 10px; color: var(--gold);">KHANQAH DAR-UL-FALAH DIGITAL LIBRARY</span>
        
        <div class="header-controls">
            <a href="https://whatsapp.com/channel/0029VaHFtAKDDmFU33nD360K" class="whatsapp-channel-btn" target="_blank">
                <i class="fab fa-whatsapp"></i>  Channel
            </a>

            <div class="header-social">
                <a href="https://archive.org/download/khanqah-darul-falah/%20Khanqah%20Darul%20falah.apk" class="app-download-btn"><i class="fab fa-android"></i> App</a>
                <a href="https://api.whatsapp.com/send?phone=923329106002" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/profile.php?id=100068373408345" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://youtube.com/@peermolanamuhammadjamshedn1391" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="tel:+923329106002" title="Call Us"<i class="fas fa-phone-alt"></i></a>
                <a href="sms:+923329106002" title="Send Message"><i class="fas fa-comment-dots"></i></a>
            </div>
        </div>
    </div>
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="gSearch" placeholder="بیان کا نام یا مقام سرچ کریں" onkeyup="smartSearch()">
        <button class="search-btn"><i class="fa fa-search"></i></button>
    </div>
</div>

<div class="slider-wrapper">
    <div class="menu-slider" id="catMenu"></div>
</div>

<div class="container">
     <div class="logo-area">
        <img src="https://archive.org/download/20260422_20260422_1213/%D8%B4%DB%8C%D8%AE%20%D8%B5%D8%A7%D8%AD%D8%A8%20%D9%84%D9%88%DA%AF%D9%88%20%D9%84%DA%A9%DA%91%DB%8C%20%D9%88%D8%A7%D9%84%D8%A7.png" alt="Library Logo">
     </div>
    <div id="master-root">
        <div style="text-align:center; padding:40px; color:var(--gold); font-weight: bold;">🌿 لائبریری لوڈ ہو رہی ہے...</div>
    </div>
</div>

<script>
    const libraryData = [
        { id: "13-2024_202510", title: "HAFTAVAR MAJALIS", icon: "fa-microphone-lines" },
        { id: "001_20251018", title: "DARUL HUDA BAYANS", icon: "fa-mosque" },
        { id: "20260205_20260205_1013", title: "DASTAR-E-FAZILAT", icon: "fa-graduation-cap" },
        { id: "22-2017_202509", title: "ISLAHI MAJALIS", icon: "fa-users-gear" },
        { id: "143_20251113", title: "DARS-E-QURAN", icon: "fa-book-quran" },
        { id: "20251018_20251018_0949", title: "HAMD-O-NAAT", icon: "fa-heart" }
    ];

    let cardProgress = {};

    function createSliderMenu() {
        const menu = document.getElementById('catMenu');
        [...libraryData, ...libraryData].forEach(item => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<i class="fa ${item.icon}"></i><span>${item.title}</span>`;
            div.onclick = () => { 
                const target = document.getElementById(`card-${item.id}`);
                const offset = 210; // اسکرول کی پوزیشن درست کرنے کے لیے
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = target.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            };
            menu.appendChild(div);
        });
    }

    async function loadLibrary() {
        createSliderMenu();
        const root = document.getElementById('master-root');
        root.innerHTML = '';
        for (const cat of libraryData) {
            try {
                const res = await fetch(`https://archive.org/metadata/${cat.id}`);
                const data = await res.json();
                let mp3s = data.files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                if (mp3s.length > 0) {
                    mp3s.sort((a, b) => (b.mtime || 0) - (a.mtime || 0));
                    cardProgress[cat.id] = 0;
                    const card = document.createElement('div');
                    card.className = 'bayan-card';
                    card.id = `card-${cat.id}`;
                    card.innerHTML = `<div class="bayan-header">${cat.title}</div><div id="list-${cat.id}"></div>
                        <div class="pagination-row" id="pagi-${cat.id}">
                            <button class="btn-page btn-back" id="back-${cat.id}" onclick="showLess('${cat.id}')" style="display:none;">BACK</button>
                            <button class="btn-page" id="more-${cat.id}" onclick="loadMoreFiles('${cat.id}')">NEXT MORE</button>
                        </div>`;
                    root.appendChild(card);
                    card.dataset.fullList = JSON.stringify(mp3s);
                    loadMoreFiles(cat.id, 1); // شروع میں 1 بیانات شو ہوں گے
                }
            } catch (err) {}
        }
    }

    function loadMoreFiles(catId, count = 10) {
        const card = document.getElementById(`card-${catId}`);
        const allFiles = JSON.parse(card.dataset.fullList);
        const start = cardProgress[catId];
        const end = start + count;
        const slice = allFiles.slice(start, end);
        renderFiles(catId, slice, false);
        cardProgress[catId] = end;
        document.getElementById(`back-${catId}`).style.display = 'block';
        if (end >= allFiles.length) document.getElementById(`more-${catId}`).style.display = 'none';
    }

    function showLess(catId) {
        document.getElementById(`list-${catId}`).innerHTML = '';
        cardProgress[catId] = 0;
        loadMoreFiles(catId, 1);
        document.getElementById(`more-${catId}`).style.display = 'block';
        document.getElementById(`back-${catId}`).style.display = 'none';
    }

    function renderFiles(catId, files, clearOld = true) {
        const target = document.getElementById(`list-${catId}`);
        if(clearOld) target.innerHTML = '';
        files.forEach((file, index) => {
            const globalIdx = clearOld ? index : (target.children.length);
            const url = `https://archive.org/download/${catId}/${encodeURIComponent(file.name)}`;
            let title = file.title || file.name.replace('.mp3', '');
            let location = "پاکستان";
            const locMatch = title.match(/\[(.*?)\]/);
            if (locMatch) { location = locMatch[1]; title = title.replace(locMatch[0], '').trim(); }

            const itemHtml = `
                <div class="audio-item">
                    <div class="title-row">
                        <span class="bayan-num">${globalIdx + 1}</span>
                        <span class="audio-title">${title}</span>
                    </div>
                    <div class="player-row">
                        <div id="spin-${catId}-${globalIdx}" class="q-spinner"></div>
                        <audio id="aud-${catId}-${globalIdx}" controls preload="none" 
                               onplay="handlePlay('${catId}', ${globalIdx})" 
                               onwaiting="toggleSpin('${catId}', ${globalIdx}, true)" 
                               onplaying="toggleSpin('${catId}', ${globalIdx}, false)">
                            <source src="${url}" type="audio/mpeg">
                        </audio>
                    </div>
                    <div id="hint-${catId}-${globalIdx}" class="dl-hint-urdu">
                        ڈاؤن لوڈ کرنے کے لئے تین نقطوں پر کلک کریں
                    </div>
                    <div class="meta-info">
                        <span>📅 ${new Date(parseInt(file.mtime)*1000).toLocaleDateString("en-GB")}</span>
                        <span class="loc-text">📍 ${location}</span>
                        <span>💾 ${(file.size/(1024*1024)).toFixed(1)} MB</span>
                    </div>
                </div>`;
            target.insertAdjacentHTML('beforeend', itemHtml);
        });
    }

    function handlePlay(catId, idx) {
        const hint = document.getElementById(`hint-${catId}-${idx}`);
        if(hint) hint.style.display = 'block';
        document.querySelectorAll('audio').forEach(a => { 
            if(a.id !== `aud-${catId}-${idx}`) {
                a.pause();
                const hid = a.id.replace('aud-', 'hint-');
                if(document.getElementById(hid)) document.getElementById(hid).style.display = 'none';
            }
        });
    }

    function toggleSpin(catId, idx, show) {
        const s = document.getElementById(`spin-${catId}-${idx}`);
        if(s) s.style.display = show ? 'block' : 'none';
    }

    function smartSearch() {
        const query = document.getElementById('gSearch').value.toLowerCase();
        const cards = document.getElementsByClassName('bayan-card');
        for (let card of cards) {
            const catId = card.id.replace('card-', '');
            const allFiles = JSON.parse(card.dataset.fullList);
            const matched = allFiles.filter(f => (f.title || f.name).toLowerCase().includes(query));
            if (matched.length > 0) {
                card.style.display = "block";
                if (query === "") { 
                    document.getElementById(`list-${catId}`).innerHTML = ''; 
                    cardProgress[catId] = 0; 
                    loadMoreFiles(catId, 2); 
                } else { 
                    renderFiles(catId, matched, true); 
                }
            } else { card.style.display = "none"; }
        }
    }
    loadLibrary();
</script>
</body>
</html>

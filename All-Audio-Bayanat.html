 <!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khanqah Dar-ul-Falah - Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #b08d43; --dark: #4e3b2b; --bg: #fdfaf3; --red: #ff0000; --green: #0a5d38; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding-top: 80px; overflow-x: hidden; }

        /* Navbar */
        .navbar { background: var(--dark); color: white; position: fixed; top: 0; width: 100%; height: 85px; display: flex; align-items: center; z-index: 1000; border-bottom: 4px solid var(--gold); }
        .navbar-text { font-size: 13px; text-align: center; width: 100%; font-weight: bold; line-height: 1.4; padding: 0 10px; }

        /* --- Header Social Icons Styled --- */
        .header-social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
        }
        .header-social a {
            color: white; /* آئیکونز کا رنگ گولڈن */
            text-decoration: none;
            font-size: 18px; /* سائز مناسب چھوٹا */
            transition: 0.5s ease;
            background: none; /* بیک گراؤنڈ ختم */
        }
        .header-social a:hover {
            color: yellow; /* ماؤس لانے پر سفید */
            transform: translateY(-2px);
        }
        /* ---------------------------------- */

        /* Search Bar */
        .search-container { background: var(--dark); padding: 10px 0; border-bottom: 2px solid var(--gold); position: sticky; top: 85px; z-index: 999; }
        .search-box { display: flex; max-width: 320px; margin: 0 auto; background: white; border-radius: 5px; overflow: hidden; border: 1px solid var(--gold); }
        .search-box input { flex: 1; border: none; padding: 8px; outline: none; font-size: 14px; text-align: right; direction: rtl; }
        .search-btn { background: var(--gold); color: white; border: none; padding: 0 15px; cursor: pointer; }

        /* Slider Menu */
        .slider-wrapper { background: #fff; border-bottom: 2px solid var(--gold); overflow-x: auto; scrollbar-width: none; white-space: nowrap; padding: 15px 0; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .menu-slider { display: inline-flex; gap: 12px; padding-left: 15px; animation: autoScroll 40s linear infinite; }
        .slider-wrapper:active .menu-slider { animation-play-state: paused; }
        @keyframes autoScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .grid-item { display: inline-block; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px; width: 100px; text-align: center; color: var(--green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; flex-shrink: 0; }
        .grid-item i { font-size: 22px; margin-bottom: 6px; display: block; }
        .grid-item span { font-size: 10px; font-weight: bold; display: block; white-space: normal; line-height: 1.2; }

        .container { max-width: 340px; margin: 0 auto; padding: 5px; }
        .logo-area { width: 100%; margin: 10px auto; background: #3d2e21; border: 2px solid var(--gold); border-radius: 5px; overflow: hidden; }
        .logo-area img { width: 100%; display: block; }

        /* Bayan Card */
        .bayan-card { background: #fff; border: 2px solid var(--gold); border-radius: 10px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bayan-header { background: var(--gold); color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 16px; }
        
        .audio-item { padding: 8px 10px; border-bottom: 2.5px solid var(--gold); background: #fffcf5; }
        .title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; direction: rtl; }
        .bayan-num { background: var(--gold); color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; flex-shrink: 0; }
        .audio-title { font-size: 13px; font-weight: bold; color: #2c3e50; flex: 1; text-align: right; }

        .new-badge { background: var(--red); color: white; font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: bold; animation: pulse 1s infinite; margin-right: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Player & Urdu Hint */
        .player-row { background: #000; padding: 3px; border-radius: 5px; margin: 5px 0; position: relative; }
        audio { width: 100%; height: 30px; filter: invert(100%) hue-rotate(180deg); }
                /* اسپینر کی پوزیشن بہتر کی گئی */
        .q-spinner { position: absolute; left: 9%; top: 46%; transform: translate(-50%, -50%); width: 16px; height: 16px; border: 2px solid rgba(176,141,67,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; z-index: 2; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }


        .dl-hint-urdu { background: var(--dark); color: var(--gold); font-size: 11px; text-align: center; padding: 8px; font-weight: bold; border-radius: 4px; margin-top: 5px; display: none; direction: rtl; border: 1px solid var(--gold); }

        .meta-info { display: flex; justify-content: space-between; font-size: 9px; color: #666; margin-top: 4px; direction: ltr; }
        .loc-text { color: var(--gold); font-weight: bold; direction: rtl; }

        .pagination-row { display: flex; gap: 8px; padding: 10px; background: #f9f9f9; }
        .btn-page { background: var(--dark); color: white; border: 1px solid var(--gold); padding: 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; flex: 1; text-transform: uppercase; }
        .btn-back { background: #666; border-color: #444; }

        footer { background: var(--dark); color: white; text-align: center; padding: 20px; font-size: 11px; border-top: 4px solid var(--gold); }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-text">
        SHEIKH-UL-HADEES HAZRAT MAULANA PEER MUHAMMAD JAMSHAID NAQSHBANDI (D.B)<br>
        <span style="font-size: 10px; color: var(--gold);">KHANQAH DAR-UL-FALAH DIGITAL LIBRARY</span>
        
 <style>
    /* سبسکرائب بٹن کا خاص اسٹائ
    /* ہیڈر کی ترتیب کو بہتر بنانے کے لیے */
    .header-controls {
        display: flex;
        justify-content: space-between; /* ایک طرف بٹن، ایک طرف آئیکونز */
        align-items: center;
        margin-top: 8px;
        padding: 0 10px;
    }
</style>



    <div class="header-social" style="margin-top: 0;">
        <a href="https://api.whatsapp.com/send?phone=923329106002" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</div>

    </div>
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="gSearch" placeholder="بیان کا نام یا مقام سرچ کریں" onkeyup="smartSearch()">
        <button class="search-btn"><i class="fa fa-search"></i></button>
    </div>
</div>

<div class="slider-wrapper">
    <div class="menu-slider" id="catMenu"></div>
</div>

<div class="container">
    <div class="logo-area">
        <img src="https://archive.org/download/20260422_20260422_1213/%D8%B4%DB%8C%D8%AE%20%D8%B5%D8%A7%D8%AD%D8%A8%20%D9%84%D9%88%DA%AF%D9%88%20%D8%B4%DB%8C%D8%B4%DB%92%20%DA%A9%D8%A7%D8%B1%DA%88.png
 " alt="Logo">
    </div>
 
         <div id="master-root">
        <div style="text-align:center; padding:40px; color:var(--gold); font-weight: bold;">🌿 Library Loading...</div>
    </div>
</div>

<script>
    const libraryData = [
        { id: "13-2024_202510", title: "HAFTAVAR MAJALIS", icon: "fa-microphone-lines" },
        { id: "001_20251018", title: "DARUL HUDA BAYANS", icon: "fa-mosque" },
        { id: "20260205_20260205_1013", title: "DASTAR-E-FAZILAT", icon: "fa-graduation-cap" },
        { id: "22-2017_202509", title: "ISLAHI MAJALIS", icon: "fa-users-gear" },
        { id: "143_20251113", title: "DARS-E-QURAN", icon: "fa-book-quran" },
        { id: "20251018_20251018_0949", title: "HAMD-O-NAAT", icon: "fa-heart" }
    ];

    let cardProgress = {};

    function createSliderMenu() {
        const menu = document.getElementById('catMenu');
        [...libraryData, ...libraryData].forEach(item => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `<i class="fa ${item.icon}"></i><span>${item.title}</span>`;
            div.onclick = () => { document.getElementById(`card-${item.id}`).scrollIntoView({ behavior: 'smooth' }); };
            menu.appendChild(div);
        });
    }

    async function loadLibrary() {
        createSliderMenu();
        const root = document.getElementById('master-root');
        root.innerHTML = '';
        for (const cat of libraryData) {
            try {
                const res = await fetch(`https://archive.org/metadata/${cat.id}`);
                const data = await res.json();
                let mp3s = data.files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                if (mp3s.length > 0) {
                    mp3s.sort((a, b) => (b.mtime || 0) - (a.mtime || 0));
                    cardProgress[cat.id] = 0;
                    const card = document.createElement('div');
                    card.className = 'bayan-card';
                    card.id = `card-${cat.id}`;
                    card.innerHTML = `<div class="bayan-header">${cat.title}</div><div id="list-${cat.id}"></div>
                        <div class="pagination-row" id="pagi-${cat.id}">
                            <button class="btn-page btn-back" id="back-${cat.id}" onclick="showLess('${cat.id}')" style="display:none;">BACK</button>
                            <button class="btn-page" id="more-${cat.id}" onclick="loadMoreFiles('${cat.id}')">NEXT MORE</button>
                        </div>`;
                    root.appendChild(card);
                    card.dataset.fullList = JSON.stringify(mp3s);
                    loadMoreFiles(cat.id, 3);
                }
            } catch (err) {}
        }
    }

    function loadMoreFiles(catId, count = 10) {
        const card = document.getElementById(`card-${catId}`);
        const allFiles = JSON.parse(card.dataset.fullList);
        const start = cardProgress[catId];
        const end = start + count;
        const slice = allFiles.slice(start, end);
        renderFiles(catId, slice, false);
        cardProgress[catId] = end;
        document.getElementById(`back-${catId}`).style.display = 'block';
        if (end >= allFiles.length) document.getElementById(`more-${catId}`).style.display = 'none';
    }

    function showLess(catId) {
        document.getElementById(`list-${catId}`).innerHTML = '';
        cardProgress[catId] = 0;
        loadMoreFiles(catId, 3);
        document.getElementById(`more-${catId}`).style.display = 'block';
        document.getElementById(`back-${catId}`).style.display = 'none';
        document.getElementById(`card-${catId}`).scrollIntoView({ behavior: 'smooth' });
    }

    function renderFiles(catId, files, clearOld = true) {
        const target = document.getElementById(`list-${catId}`);
        if(clearOld) target.innerHTML = '';
        const sevenDaysAgo = (Date.now() / 1000) - (7 * 24 * 60 * 60);
        files.forEach((file, index) => {
            const globalIdx = clearOld ? index : (target.children.length);
            const url = `https://archive.org/download/${catId}/${encodeURIComponent(file.name)}`;
            const isNew = file.mtime && parseInt(file.mtime) > sevenDaysAgo;
            let title = file.title || file.name.replace('.mp3', '');
            let location = "پاکستان";
            const locMatch = title.match(/\[(.*?)\]/);
            if (locMatch) { location = locMatch[1]; title = title.replace(locMatch[0], '').trim(); }

            const itemHtml = `
                <div class="audio-item">
                    <div class="title-row">
                        <span class="bayan-num">${globalIdx + 1}</span>
                        <span class="audio-title">${title}</span>
                        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
                    </div>
                    <div class="player-row">
                        <div id="spin-${catId}-${globalIdx}" class="q-spinner"></div>
                        <audio id="aud-${catId}-${globalIdx}" controls preload="none" 
                               onplay="handlePlay('${catId}', ${globalIdx})" 
                               onwaiting="toggleSpin('${catId}', ${globalIdx}, true)" 
                               onplaying="toggleSpin('${catId}', ${globalIdx}, false)">
                            <source src="${url}" type="audio/mpeg">
                        </audio>
                    </div>
                    <div id="hint-${catId}-${globalIdx}" class="dl-hint-urdu">
                        ڈاؤن لوڈ کرنے کے لئے تین نقطوں پر کلک کریں اور بیان محفوظ کریں
                    </div>
                    <div class="meta-info">
                        <span>📅 ${new Date(parseInt(file.mtime)*1000).toLocaleDateString("en-GB")}</span>
                        <span class="loc-text">📍 ${location}</span>
                        <span>💾 ${(file.size/(1024*1024)).toFixed(1)} MB</span>
                    </div>
                </div>`;
            target.insertAdjacentHTML('beforeend', itemHtml);
        });
    }

    function handlePlay(catId, idx) {
        const hint = document.getElementById(`hint-${catId}-${idx}`);
        if(hint) hint.style.display = 'block';
        document.querySelectorAll('audio').forEach(a => { 
            if(a.id !== `aud-${catId}-${idx}`) {
                a.pause();
                const hid = a.id.replace('aud-', 'hint-');
                if(document.getElementById(hid)) document.getElementById(hid).style.display = 'none';
            }
        });
    }

    function toggleSpin(catId, idx, show) {
        const s = document.getElementById(`spin-${catId}-${idx}`);
        if(s) s.style.display = show ? 'block' : 'none';
    }

    function smartSearch() {
        const query = document.getElementById('gSearch').value.toLowerCase();
        const cards = document.getElementsByClassName('bayan-card');
        for (let card of cards) {
            const catId = card.id.replace('card-', '');
            const allFiles = JSON.parse(card.dataset.fullList);
            const matched = allFiles.filter(f => (f.title || f.name).toLowerCase().includes(query));
            if (matched.length > 0) {
                card.style.display = "block";
                if (query === "") { document.getElementById(`list-${catId}`).innerHTML = ''; cardProgress[catId] = 0; loadMoreFiles(catId, 3); } 
                else { renderFiles(catId, matched, true); }
            } else { card.style.display = "none"; }
        }
    }
    loadLibrary();
</script>
</body>
</html>
